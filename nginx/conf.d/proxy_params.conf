# ════════════════════════════════════════════════════════════
# /etc/nginx/conf.d/proxy_params.conf
# Shared proxy settings — included by all location blocks
#
# BUG 1 + BUG 2 FIX:
#   This file was either missing (nginx startup error) or existed
#   without proxy_http_version 1.1 (keepalive silently broken).
#
# proxy_http_version 1.1  — REQUIRED for upstream keepalive to work.
#   Without it, nginx uses HTTP/1.0 which sends Connection: close
#   on every request, completely ignoring keepalive 32 in upstream.
#   Each request opens a new TCP connection → pool exhaustion → 503.
#
# proxy_set_header Connection ""  — REQUIRED alongside http_version 1.1.
#   Clears the Connection: close header that HTTP/1.0 adds by default.
#   Without this, keepalive negotiation with upstream fails silently.
# ════════════════════════════════════════════════════════════

# FIX BUG 2: These two lines are the core keepalive fix.
# They were commented out in bpscnotes.conf and default.conf.
proxy_http_version 1.1;
proxy_set_header   Connection "";          # clear Connection: close for keepalive

proxy_set_header   Host              $host;
proxy_set_header   X-Real-IP         $remote_addr;
proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
proxy_set_header   X-Forwarded-Proto $scheme;

proxy_connect_timeout  10s;
proxy_send_timeout     60s;
proxy_read_timeout     60s;

# Retry failed upstream requests transparently
proxy_next_upstream         error timeout http_502 http_503 http_504;
proxy_next_upstream_tries   2;
proxy_next_upstream_timeout 10s;

proxy_buffering    on;
proxy_buffer_size  8k;
proxy_buffers      8 8k;
