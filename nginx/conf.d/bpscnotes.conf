# ════════════════════════════════════════════════════════════
# BPSCNotes API — Nginx Site Configuration
# Domain: api.bpscnotes.com  (change to your domain)
# ════════════════════════════════════════════════════════════

# ── HTTP → HTTPS redirect ────────────────────────────────────
server {
  listen 80;
  listen [::]:80;
  server_name api.bpscnotes.com www.api.bpscnotes.com;

  # Let's Encrypt challenge
  location /.well-known/acme-challenge/ {
    root /var/www/certbot;
  }

  # Redirect all HTTP to HTTPS
  location / {
    return 301 https://$host$request_uri;
  }
}

# ── HTTPS Server ─────────────────────────────────────────────
server {
  listen 443 ssl http2;
  listen [::]:443 ssl http2;
  server_name api.bpscnotes.com;

  # ── SSL Certificates (Let's Encrypt) ─────────────────────
  ssl_certificate     /etc/letsencrypt/live/api.bpscnotes.com/fullchain.pem;
  ssl_certificate_key /etc/letsencrypt/live/api.bpscnotes.com/privkey.pem;

  # ── SSL Security ─────────────────────────────────────────
  ssl_protocols             TLSv1.2 TLSv1.3;
  ssl_ciphers               ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
  ssl_prefer_server_ciphers off;
  ssl_session_cache         shared:SSL:10m;
  ssl_session_timeout       10m;
  ssl_session_tickets       off;
  ssl_stapling              on;
  ssl_stapling_verify       on;

  # HSTS (1 year)
  add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;

  # ── Health check (no rate limit) ─────────────────────────
  location = /health {
    proxy_pass         http://bpscnotes_api;
    proxy_http_version 1.1;
    access_log off;
  }

  # ── OTP endpoints (strict rate limit) ────────────────────
  location ~ ^/api/v1/auth/send-otp {
    limit_req  zone=otp_limit   burst=3  nodelay;
    limit_conn conn_limit 5;
    proxy_pass http://bpscnotes_api;
    include    /etc/nginx/conf.d/proxy_params.conf;
  }

  # ── Auth endpoints (moderate rate limit) ─────────────────
  location ~ ^/api/v1/auth/ {
    limit_req  zone=login_limit burst=10 nodelay;
    proxy_pass http://bpscnotes_api;
    include    /etc/nginx/conf.d/proxy_params.conf;
  }

  # ── Admin endpoints (separate rate limit) ─────────────────
  location ~ ^/api/v1/admin/ {
    limit_req  zone=login_limit burst=20 nodelay;
    proxy_pass http://bpscnotes_api;
    include    /etc/nginx/conf.d/proxy_params.conf;
  }

  # ── Swagger Docs (dev/staging only — block in production) ─
  location /docs {
    # Uncomment to block in production:
    # return 404;
    proxy_pass http://bpscnotes_api;
    include    /etc/nginx/conf.d/proxy_params.conf;
  }

  # ── All other API routes ──────────────────────────────────
  location /api/ {
    limit_req  zone=api_limit burst=50 nodelay;
    limit_conn conn_limit 20;
    proxy_pass http://bpscnotes_api;
    include    /etc/nginx/conf.d/proxy_params.conf;
  }

  # ── Block access to sensitive paths ──────────────────────
  location ~ /\. { deny all; }
  location ~ \.(env|git|sh)$ { deny all; return 404; }
}
