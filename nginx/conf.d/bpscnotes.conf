# nginx/conf.d/bpscnotes.conf
#

# ── HTTP → HTTPS redirect ─────────────────────────────────────
server {
  listen 80;
  listen [::]:80;
  server_name api.bpscnotes.in;

  # Let's Encrypt challenge
  location /.well-known/acme-challenge/ {
    root /var/www/certbot;
  }

  location / {
    return 301 https://$host$request_uri;
  }
}

# ── HTTPS API Server ──────────────────────────────────────────
server {
  listen 443 ssl http2;
  listen [::]:443 ssl http2;
  server_name api.bpscnotes.in;

  ssl_certificate     /etc/letsencrypt/live/api.bpscnotes.in/fullchain.pem;
  ssl_certificate_key /etc/letsencrypt/live/api.bpscnotes.in/privkey.pem;
  ssl_protocols             TLSv1.2 TLSv1.3;
  ssl_ciphers               ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
  ssl_prefer_server_ciphers off;
  ssl_session_cache         shared:SSL:10m;
  ssl_session_timeout       10m;
  ssl_session_tickets       off;
  ssl_stapling              on;
  ssl_stapling_verify       on;

  add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;

  # Health check — no rate limit, no auth
  location = /health {
    proxy_pass http://bpscnotes_api/health;
    proxy_http_version 1.1;

    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

    access_log off;
}

  # OTP — strict rate limit
  location ~ ^/api/v1/auth/send-otp {
    limit_req  zone=otp_limit burst=3 nodelay;
    limit_conn conn_limit 5;
    proxy_pass http://bpscnotes_api;
    include    /etc/nginx/conf.d/proxy_params.conf;
  }

  # Auth endpoints
  location ~ ^/api/v1/auth/ {
    limit_req  zone=login_limit burst=10 nodelay;
   proxy_pass http://bpscnotes_api;
    include    /etc/nginx/conf.d/proxy_params.conf;
  }

  # Admin endpoints
  location ~ ^/api/v1/admin/ {
    limit_req  zone=login_limit burst=20 nodelay;
    proxy_pass http://bpscnotes_api;
    include    /etc/nginx/conf.d/proxy_params.conf;
  }

  # Block Swagger in production
  location /docs {
    return 404;
  }

  # All other API routes
  location /api/ {
    limit_req  zone=api_limit burst=50 nodelay;
    limit_conn conn_limit 20;
    proxy_pass http://bpscnotes_api;
    include    /etc/nginx/conf.d/proxy_params.conf;
  }

  # Block sensitive files
  location ~ /\.          { deny all; }
  location ~ \.(env|git|sh)$ { deny all; return 404; }
}
