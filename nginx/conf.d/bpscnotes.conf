# ════════════════════════════════════════════════════════════
# /etc/nginx/conf.d/bpscnotes.conf
#
# ROOT CAUSE FIX: Rate limiting was killing admin panel
#
# BEFORE (the bug):
#   location ~ ^/api/v1/admin/ {
#       limit_req zone=login_limit burst=20 nodelay;
#   }
#   login_limit = 20r/m, burst=20
#
# WHY IT BROKE:
#   Dashboard loads 6 admin API calls in parallel.
#   After 3 page loads = 18 requests → burst exhausted.
#   Load #4 → nginx returns 503 to 4 of 6 requests WITHOUT
#   ever touching the backend. Backend shows 200 in logs
#   because those requests never reached it.
#   nginx 503 has no CORS headers → browser reports
#   "No Access-Control-Allow-Origin header" (fake CORS error).
#   Wait 1 minute → burst replenishes → "refresh fixes it".
#
# FIX:
#   Admin endpoints are already protected by JWT (AdminJwtGuard).
#   Rate limiting on top of JWT auth is redundant and harmful.
#   Use a dedicated admin_limit zone: 300r/m, burst=100.
#   This allows ~30 rapid page loads before any throttling.
# ════════════════════════════════════════════════════════════

server {
    listen      80;
    listen      [::]:80;
    server_name api.bpscnotes.in;

    location /.well-known/acme-challenge/ { root /var/www/certbot; }
    location / { return 301 https://$host$request_uri; }
}

server {
    listen      443 ssl http2;
    listen      [::]:443 ssl http2;
    server_name api.bpscnotes.in;

    ssl_certificate     /etc/letsencrypt/live/api.bpscnotes.in/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.bpscnotes.in/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 10m;
    ssl_session_tickets off;
    ssl_stapling        on;
    ssl_stapling_verify on;

    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
    client_max_body_size 50M;

    # ── Health (no rate limit) ────────────────────────────────
    location = /health {
        proxy_pass         http://bpscnotes_api;
        proxy_http_version 1.1;
        proxy_set_header   Connection "";
        proxy_set_header   Host $host;
        access_log         off;
    }

    # ── OTP — strict (5r/m is correct) ───────────────────────
    location ~ ^/api/v1/auth/send-otp {
        limit_req  zone=otp_limit burst=3 nodelay;
        limit_conn conn_limit 5;
        proxy_pass http://bpscnotes_api;
        include    /etc/nginx/conf.d/proxy_params.conf;
    }

    # ── Auth (mobile login, register) ────────────────────────
    location ~ ^/api/v1/auth/ {
        limit_req zone=login_limit burst=10 nodelay;
        proxy_pass http://bpscnotes_api;
        include    /etc/nginx/conf.d/proxy_params.conf;
    }

    # ── Admin endpoints ───────────────────────────────────────
    # FIX: Was using login_limit (20r/m, burst=20) — far too low.
    # Dashboard makes 6 parallel calls per page load.
    # After 3-4 page loads the burst was exhausted → 503 for everything.
    # Admin routes are JWT-protected so rate limiting adds little security.
    # New: api_limit zone (100r/m) with burst=100, nodelay.
    location ~ ^/api/v1/admin/ {
        limit_req  zone=api_limit burst=100 nodelay;
        proxy_pass http://bpscnotes_api;
        include    /etc/nginx/conf.d/proxy_params.conf;
    }

    # ── WebSocket ─────────────────────────────────────────────
    location /socket.io/ {
        proxy_pass         http://bpscnotes_api;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade    $http_upgrade;
        proxy_set_header   Connection "upgrade";
        proxy_set_header   Host       $host;
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
    }

    # ── All other API routes ──────────────────────────────────
    location /api/ {
        limit_req  zone=api_limit burst=50 nodelay;
        limit_conn conn_limit 20;
        proxy_pass http://bpscnotes_api;
        include    /etc/nginx/conf.d/proxy_params.conf;
    }

    location /docs { return 404; }
    location ~ /\.            { deny all; }
    location ~ \.(env|git|sh)$ { deny all; return 404; }
}
