# nginx/conf.d/default.conf
#
# BUGS FIXED:
#   1. Removed duplicate api.bpscnotes.in server block — it conflicts with
#      the one in bpscnotes.conf (loaded alphabetically before default.conf).
#   2. Admin /api/ proxy — added missing headers, timeout, and connection config.
#   3. Admin Next.js proxy uses host.docker.internal for reliability.

# ── ADMIN PANEL ────────────────────────────────────────────────
server {
  listen 80;
  listen [::]:80;
  server_name admin.bpscnotes.in;

  # Let's Encrypt challenge
  location /.well-known/acme-challenge/ {
    root /var/www/certbot;
  }

  # All traffic → HTTPS
  location / {
    return 301 https://$host$request_uri;
  }
}

server {
  listen 443 ssl http2;
  listen [::]:443 ssl http2;
  server_name admin.bpscnotes.in;

  ssl_certificate     /etc/letsencrypt/live/admin.bpscnotes.in/fullchain.pem;
  ssl_certificate_key /etc/letsencrypt/live/admin.bpscnotes.in/privkey.pem;
  ssl_protocols             TLSv1.2 TLSv1.3;
  ssl_prefer_server_ciphers off;
  ssl_session_cache         shared:SSL:10m;
  ssl_session_timeout       10m;

  # API calls proxied from the admin Next.js frontend
  # (browser sends requests to admin.bpscnotes.in/api/... → forwarded to api container)
  location /api/ {
    proxy_pass         http://bpscnotes_api/api/;
    include            /etc/nginx/conf.d/proxy_params.conf;
    limit_req          zone=api_limit burst=50 nodelay;
  }

  # Admin Next.js app
  # host.docker.internal resolves to the Docker host — works when Next.js
  # runs as a bare process (not in a container) on port 3000.
  location / {
    proxy_pass          http://172.17.0.1:3000;
    include            /etc/nginx/conf.d/proxy_params.conf;
  }
}
