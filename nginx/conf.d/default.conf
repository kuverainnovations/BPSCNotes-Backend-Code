# ════════════════════════════════════════════════════════════
# /etc/nginx/conf.d/default.conf
# Admin domain: https://admin.bpscnotes.in
#
# FIXES:
#   BUG 3: Was using `proxy_pass http://172.17.0.1:3000` directly,
#           bypassing the bpscnotes_admin upstream entirely.
#           nginx.conf defined bpscnotes_admin upstream but it was
#           never used — default.conf used raw IP instead.
#           172.17.0.1 changes on Docker daemon restart → instant 503.
#           FIX: Use upstream name `bpscnotes_admin` (defined in nginx.conf
#           pointing to host.docker.internal:3000).
#
#   BUG 2: proxy_http_version was commented out in /api/ location.
#           FIX: proxy_params.conf now has it always applied.
#
#   CORS: Admin browser → api.bpscnotes.in is a cross-origin call.
#         CORS is handled entirely by NestJS. Nginx adds nothing.
#         The /api/ proxy location here (admin.bpscnotes.in/api/) is
#         NOT the right approach — the admin panel's fetch() calls go
#         directly to api.bpscnotes.in, not through admin domain.
#         Removing it prevents double-proxying confusion.
# ════════════════════════════════════════════════════════════

server {
    listen      80;
    listen      [::]:80;
    server_name admin.bpscnotes.in;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }
    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen      443 ssl http2;
    listen      [::]:443 ssl http2;
    server_name admin.bpscnotes.in;

    # Using api.bpscnotes.in cert (SAN covers both domains)
    ssl_certificate     /etc/letsencrypt/live/api.bpscnotes.in/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.bpscnotes.in/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 10m;

    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # Next.js static assets — aggressive caching
    location /_next/static/ {
        proxy_pass http://bpscnotes_admin;       # FIX BUG 3: use upstream name, not 172.17.0.1
        include    /etc/nginx/conf.d/proxy_params.conf;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    # Next.js admin app — ALL traffic
    # FIX BUG 3: was `proxy_pass http://172.17.0.1:3000` hardcoded IP
    # Now uses the upstream defined in nginx.conf → host.docker.internal:3000
    location / {
        proxy_pass http://bpscnotes_admin;
        include    /etc/nginx/conf.d/proxy_params.conf;

        # Next.js SSR needs these for correct URL generation
        proxy_set_header Host              $host;
        proxy_set_header X-Forwarded-Host  $host;
        proxy_set_header X-Forwarded-Port  443;
    }
}
