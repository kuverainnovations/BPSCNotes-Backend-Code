# /etc/nginx/conf.d/default.conf — admin.bpscnotes.in
server {
    listen 80; listen [::]:80;
    server_name admin.bpscnotes.in;
    location /.well-known/acme-challenge/ { root /var/www/certbot; }
    location / { return 301 https://$host$request_uri; }
}

server {
    listen 443 ssl http2; listen [::]:443 ssl http2;
    server_name admin.bpscnotes.in;
    ssl_certificate     /etc/letsencrypt/live/api.bpscnotes.in/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.bpscnotes.in/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;

    # location /_next/static/ {
    #     proxy_pass http://bpscnotes_admin;
    #     include    /etc/nginx/conf.d/proxy_params.conf;
    #     add_header Cache-Control "public, max-age=31536000, immutable";
    # }
    # location / {
    #     proxy_pass http://bpscnotes_admin;
    #     include    /etc/nginx/conf.d/proxy_params.conf;
    #     proxy_set_header X-Forwarded-Host $host;
    #     proxy_set_header X-Forwarded-Port 443;
    # }

    location /_next/static/ {
    return 502;
}

location / {
    return 502;
}
}
