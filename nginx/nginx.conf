# ════════════════════════════════════════════════════════════
# Nginx Configuration — Production-Grade
# File: /etc/nginx/sites-available/bpscnotes
#
# ROOT CAUSE FIXES:
#
# BUG 16 — NO UPSTREAM KEEPALIVE
#   Without keepalive, every request creates a new TCP connection
#   to PM2. On high load, connection queue builds up → 502 errors.
#   FIX: upstream block with keepalive 32
#
# BUG 17 — NO PROXY TIMEOUT CONFIGURATION
#   If NestJS is slow (DB query, Redis miss), Nginx default 60s
#   timeout triggers first, returning 504 before NestJS responds.
#   FIX: explicit proxy_read_timeout 30s
#
# BUG 18 — MISSING UPSTREAM HEALTH HEADER HANDLING
#   Without proxy_next_upstream, if the first upstream (PM2 cluster
#   instance 1) returns 502, Nginx doesn't try instance 2.
#   FIX: proxy_next_upstream for error/timeout/502/503/504
# ════════════════════════════════════════════════════════════

# BUG 16 FIX: upstream with keepalive
upstream bpscnotes_api {
    server 127.0.0.1:5000;
    server 127.0.0.1:5001;      # second PM2 cluster instance (if running on different port)
    keepalive 32;               # reuse connections — eliminates TCP handshake overhead
}

upstream bpscnotes_admin {
    server 127.0.0.1:3000;
    keepalive 16;
}

# ── Admin Panel — https://admin.bpscnotes.in ─────────────────
server {
    listen 443 ssl http2;
    server_name admin.bpscnotes.in;

    # SSL
    ssl_certificate     /etc/letsencrypt/live/admin.bpscnotes.in/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/admin.bpscnotes.in/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_session_cache   shared:SSL:10m;

    # Security headers
    add_header X-Frame-Options        "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff"    always;
    add_header Referrer-Policy        "strict-origin-when-cross-origin" always;

    location / {
        proxy_pass         http://bpscnotes_admin;
        proxy_http_version 1.1;

        # BUG 16 FIX: keepalive connection reuse
        proxy_set_header Connection "";

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # BUG 17 FIX: explicit timeouts
        proxy_connect_timeout  10s;
        proxy_send_timeout     30s;
        proxy_read_timeout     30s;

        # BUG 18 FIX: try next upstream on error
        proxy_next_upstream error timeout http_502 http_503 http_504;
        proxy_next_upstream_tries 2;
    }

    # Next.js static assets — long cache, never proxied
    location /_next/static/ {
        proxy_pass       http://bpscnotes_admin;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        add_header Cache-Control "public, max-age=31536000, immutable";
    }
}

# ── API — https://api.bpscnotes.in ───────────────────────────
server {
    listen 443 ssl http2;
    server_name api.bpscnotes.in;

    ssl_certificate     /etc/letsencrypt/live/api.bpscnotes.in/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.bpscnotes.in/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_session_cache   shared:SSL:10m;

    # Body size — for file uploads
    client_max_body_size 50M;

    location / {
        proxy_pass         http://bpscnotes_api;
        proxy_http_version 1.1;
        proxy_set_header Connection "";       # keepalive

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_connect_timeout  10s;
        proxy_send_timeout     60s;
        proxy_read_timeout     60s;           # NestJS API timeout

        proxy_next_upstream error timeout http_502 http_503 http_504;
        proxy_next_upstream_tries 2;

        # Buffering on — prevents slow clients from holding NestJS threads
        proxy_buffering    on;
        proxy_buffer_size  4k;
        proxy_buffers      8 4k;
    }

    # WebSocket — Socket.IO for study rooms
    location /socket.io/ {
        proxy_pass         http://bpscnotes_api;
        proxy_http_version 1.1;
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host       $host;
        proxy_read_timeout          300s;     # WS connections stay open
        proxy_send_timeout          300s;
    }

    # Health check — bypass proxy for quick check
    location /health {
        proxy_pass         http://bpscnotes_api;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        access_log off;                       # don't pollute logs with health pings
    }
}

# HTTP → HTTPS redirect
server {
    listen 80;
    server_name admin.bpscnotes.in api.bpscnotes.in;
    return 301 https://$host$request_uri;
}
