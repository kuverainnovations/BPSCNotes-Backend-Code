events {
    worker_connections 1024;
    multi_accept on;
    use epoll;
}
http {
    include      /etc/nginx/mime.types;
    default_type application/octet-stream;
    sendfile on; tcp_nopush on; tcp_nodelay on; keepalive_timeout 65; server_tokens off;
    gzip on; gzip_vary on; gzip_proxied any; gzip_comp_level 4;
    gzip_types text/plain text/css text/xml text/javascript application/json application/javascript image/svg+xml;

    limit_req_zone  $binary_remote_addr zone=otp_limit:10m   rate=5r/m;
    limit_req_zone  $binary_remote_addr zone=login_limit:10m rate=20r/m;
    limit_req_zone  $binary_remote_addr zone=api_limit:20m   rate=100r/m;
    limit_conn_zone $binary_remote_addr zone=conn_limit:10m;

    upstream bpscnotes_api {
        server    bpscnotes-api:5000;
        keepalive 32;
        keepalive_requests 1000;
        keepalive_timeout  60s;
    }
    # upstream bpscnotes_admin {
    #     server    bpscnotes-admin:3000;
    #     keepalive 16;
    #     keepalive_requests 500;
    #     keepalive_timeout  60s;
    # }
    include /etc/nginx/conf.d/*.conf;
}
