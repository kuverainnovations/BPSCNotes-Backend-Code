# ════════════════════════════════════════════════════════════
# /etc/nginx/nginx.conf  (mounted into bpscnotes-nginx container)
#
# BUG 6 FIX: events {} was empty — no worker_connections
#   Dashboard makes 5 parallel calls. Empty events = default 512 or 0
#   connections. Under concurrent load, slots exhaust → immediate 503.
#
# UPSTREAM FIXES:
#   bpscnotes_admin now points to host.docker.internal:3000
#   (requires extra_hosts in docker-compose — see docker-compose.yml fix)
#   172.17.0.1 was wrong — it changes on Docker daemon restart.
# ════════════════════════════════════════════════════════════

events {
    worker_connections 1024;   # FIX: was empty → no connections allowed under load
    multi_accept       on;
    use                epoll;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    log_format main '$remote_addr - [$time_local] "$request" '
                    '$status $body_bytes_sent '
                    'rt=$request_time urt=$upstream_response_time';

    access_log /var/log/nginx/access.log main;
    error_log  /var/log/nginx/error.log  warn;

    sendfile          on;
    tcp_nopush        on;
    tcp_nodelay       on;
    keepalive_timeout 65;
    server_tokens     off;

    gzip              on;
    gzip_vary         on;
    gzip_proxied      any;
    gzip_comp_level   4;
    gzip_types        text/plain text/css text/xml text/javascript
                      application/json application/javascript image/svg+xml;

    limit_req_zone  $binary_remote_addr zone=otp_limit:10m   rate=5r/m;
    limit_req_zone  $binary_remote_addr zone=login_limit:10m rate=20r/m;
    limit_req_zone  $binary_remote_addr zone=api_limit:20m   rate=100r/m;
    limit_conn_zone $binary_remote_addr zone=conn_limit:10m;

    # ── API upstream — Docker internal DNS (stable) ──────────
    upstream bpscnotes_api {
        server    bpscnotes-api:5000;
        keepalive 32;
        keepalive_requests 1000;
        keepalive_timeout  60s;
    }

    # ── Admin upstream — HOST machine PM2 on port 3000 ───────
    # FIX: was 172.17.0.1 which changes on Docker daemon restart
    # host.docker.internal is Docker's permanent alias for the host machine.
    # Requires: extra_hosts: ["host.docker.internal:host-gateway"] in docker-compose.yml
    upstream bpscnotes_admin {
        server    host.docker.internal:3000;
        keepalive 16;
        keepalive_requests 500;
        keepalive_timeout  60s;
    }

    include /etc/nginx/conf.d/*.conf;
}
